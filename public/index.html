<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Redis stream listener</title>
    <style>
      :root {
        --bg: #0f1419;
        --panel: #1a2332;
        --border: #2d3a4f;
        --text: #e7ecf3;
        --muted: #8b9cb3;
        --accent: #3d9cf5;
        --ok: #34d399;
        --mono: ui-monospace, 'SF Mono', Menlo, monospace;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        font-size: 14px;
        line-height: 1.5;
      }
      header {
        padding: 1rem 1.25rem;
        border-bottom: 1px solid var(--border);
        background: var(--panel);
      }
      h1 {
        margin: 0;
        font-size: 1.1rem;
        font-weight: 600;
      }
      .sub {
        margin: 0.35rem 0 0;
        color: var(--muted);
        font-size: 0.85rem;
      }
      .tabs {
        display: inline-flex;
        gap: 0.25rem;
        margin-top: 0.75rem;
        padding: 3px;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 8px;
      }
      .tabs button {
        margin: 0;
        border: none;
        background: transparent;
        color: var(--muted);
        padding: 0.35rem 0.9rem;
        border-radius: 6px;
        font-size: 0.8rem;
        font-weight: 500;
      }
      .tabs button:hover {
        color: var(--text);
        border-color: transparent;
      }
      .tabs button[aria-selected='true'] {
        background: var(--panel);
        color: var(--accent);
        box-shadow: 0 0 0 1px var(--border);
      }
      .status {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        margin-top: 0.65rem;
        font-size: 0.8rem;
      }
      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #f87171;
      }
      .dot.live {
        background: var(--ok);
        box-shadow: 0 0 8px var(--ok);
      }
      main {
        padding: 1rem 1.25rem 2rem;
        max-width: 960px;
        margin: 0 auto;
      }
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin-bottom: 1rem;
      }
      button {
        background: var(--panel);
        color: var(--text);
        border: 1px solid var(--border);
        padding: 0.45rem 0.85rem;
        border-radius: 6px;
        cursor: pointer;
        font-size: 0.85rem;
      }
      button:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      #log {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
        min-height: 320px;
        max-height: calc(100vh - 220px);
        overflow: auto;
        padding: 0.75rem;
        font-family: var(--mono);
        font-size: 12px;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .entry {
        border-bottom: 1px solid var(--border);
        padding: 0.6rem 0;
        border-radius: 6px;
        transition: box-shadow 0.2s ease, background-color 0.2s ease;
      }
      .entry:last-child {
        border-bottom: none;
      }
      @keyframes entryNewFlash {
        0%,
        100% {
          box-shadow: none;
          background-color: transparent;
        }
        50% {
          box-shadow: 0 0 18px rgba(61, 156, 245, 0.45);
          background-color: rgba(61, 156, 245, 0.09);
        }
      }
      .entry--new {
        animation: entryNewFlash 1s ease-in-out 5;
      }
      @media (prefers-reduced-motion: reduce) {
        .entry--new {
          animation: none;
          outline: 2px solid var(--accent);
          outline-offset: 2px;
        }
      }
      .meta {
        color: var(--muted);
        margin-bottom: 0.35rem;
      }
      .json {
        color: var(--accent);
      }
      .empty {
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Redis stream listener</h1>
      <p class="sub">
        Shows messages your trading engine publishes via
        <code>xadd</code> (field <code>data</code>). Match
        <code>STREAM_KEYS</code> to <code>KEY_STREAM.*</code>.
        Reading does not remove entries from Redis; newest first.
      </p>
      <div
        class="tabs"
        role="tablist"
        aria-label="Redis connection profile"
      >
        <button
          type="button"
          id="tabPc"
          role="tab"
          aria-selected="true"
          aria-controls="log"
          data-profile="pc"
        >
          PC
        </button>
        <button
          type="button"
          id="tabDemo"
          role="tab"
          aria-selected="false"
          aria-controls="log"
          data-profile="demo"
        >
          Demo
        </button>
      </div>
      <div class="status">
        <span class="dot" id="dot" aria-hidden="true"></span>
        <span id="statusText">Connecting…</span>
      </div>
    </header>
    <main>
      <div class="toolbar">
        <button type="button" id="clear">Clear screen</button>
      </div>
      <div id="log"><div class="empty">Waiting for events…</div></div>
    </main>
    <script>
      const logEl = document.getElementById('log')
      const dot = document.getElementById('dot')
      const statusText = document.getElementById('statusText')
      const tabPc = document.getElementById('tabPc')
      const tabDemo = document.getElementById('tabDemo')
      /** @type {EventSource | null} */
      let activeEs = null
      /** @type {'pc' | 'demo'} */
      let activeProfile = 'pc'

      document.getElementById('clear').addEventListener('click', () => {
        logEl.innerHTML = '<div class="empty">Cleared.</div>'
      })

      function setTabSelected(profile) {
        const isPc = profile === 'pc'
        tabPc.setAttribute('aria-selected', isPc ? 'true' : 'false')
        tabDemo.setAttribute('aria-selected', isPc ? 'false' : 'true')
      }

      function disconnectSse() {
        if (activeEs) {
          activeEs.close()
          activeEs = null
        }
      }

      /** ISO string → readable local time (hover meta for raw ISO). */
      function formatEventTime(iso) {
        if (!iso || typeof iso !== 'string') return String(iso ?? '')
        const d = new Date(iso)
        if (Number.isNaN(d.getTime())) return iso
        try {
          return new Intl.DateTimeFormat(undefined, {
            weekday: 'short',
            year: 'numeric',
            month: 'short',
            day: 'numeric',
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit',
            fractionalSecondDigits: 3,
            timeZoneName: 'short'
          }).format(d)
        } catch {
          return d.toLocaleString(undefined, {
            dateStyle: 'medium',
            timeStyle: 'medium'
          })
        }
      }

      function createMessageEntryEl(obj) {
        const wrap = document.createElement('div')
        wrap.className = 'entry'
        wrap.dataset.streamId = obj.stream + ':' + obj.id

        const meta = document.createElement('div')
        meta.className = 'meta'
        meta.title = 'ISO: ' + obj.receivedAt
        meta.textContent =
          formatEventTime(obj.receivedAt) +
          ' | ' +
          obj.stream +
          ' | id ' +
          obj.id

        const pre = document.createElement('pre')
        pre.className = 'json'
        pre.textContent = JSON.stringify(obj.data, null, 2)

        wrap.appendChild(meta)
        wrap.appendChild(pre)
        return wrap
      }

      /** items: newest first → DOM: newest at top */
      function renderHistory(items) {
        logEl.innerHTML = ''
        if (!items || items.length === 0) {
          logEl.innerHTML =
            '<div class="empty">No recent entries in stream (yet).</div>'
          return
        }
        for (let i = items.length - 1; i >= 0; i--) {
          logEl.insertBefore(
            createMessageEntryEl(items[i]),
            logEl.firstChild
          )
        }
      }

      function prependLiveMessage(obj) {
        const empty = logEl.querySelector('.empty')
        if (empty) empty.remove()

        const key = obj.stream + ':' + obj.id
        if (logEl.querySelector('[data-stream-id="' + key + '"]')) return

        const wrap = createMessageEntryEl(obj)
        wrap.classList.add('entry--new')
        const stopFlash = () => {
          wrap.classList.remove('entry--new')
        }
        wrap.addEventListener('animationend', stopFlash, { once: true })
        window.setTimeout(stopFlash, 5200)
        logEl.insertBefore(wrap, logEl.firstChild)
      }

      function appendEntry(obj) {
        if (obj.type === 'stream_message') {
          prependLiveMessage(obj)
        }
      }

      /**
       * @param {'pc' | 'demo'} profile
       */
      function connect(profile) {
        disconnectSse()
        activeProfile = profile
        setTabSelected(profile)
        dot.classList.remove('live')
        statusText.textContent = 'Connecting…'
        logEl.innerHTML = '<div class="empty">Waiting for events…</div>'

        const es = new EventSource(
          '/api/events?profile=' + encodeURIComponent(profile)
        )
        activeEs = es
        es.onopen = () => {
          dot.classList.add('live')
          statusText.textContent = 'Live (SSE) — ' + profile.toUpperCase()
        }
        es.onerror = () => {
          dot.classList.remove('live')
          statusText.textContent =
            'Disconnected — retrying… (' + profile.toUpperCase() + ')'
        }
        es.onmessage = (ev) => {
          try {
            const obj = JSON.parse(ev.data)
            if (obj.type === 'config_error') {
              if (activeEs === es) {
                es.close()
                activeEs = null
              }
              dot.classList.remove('live')
              statusText.textContent = 'Not configured'
              logEl.innerHTML =
                '<div class="empty">' +
                (obj.message || 'Missing Redis URL for this tab.') +
                '</div>'
              return
            }
            if (obj.type === 'connected') {
              statusText.textContent =
                'Live — ' +
                (obj.profile || profile).toUpperCase() +
                ' — streams: ' +
                (obj.streams || []).join(', ')
              return
            }
            if (obj.type === 'history') {
              renderHistory(obj.items)
              return
            }
            if (obj.type === 'history_error') {
              logEl.innerHTML =
                '<div class="empty">History load failed: ' +
                (obj.message || 'unknown') +
                '</div>'
              return
            }
            appendEntry(obj)
          } catch {
            logEl.insertAdjacentHTML(
              'afterbegin',
              '<div class="entry"><pre class="json">' +
                (ev.data || '') +
                '</pre></div>'
            )
          }
        }
      }

      function onTabClick(profile) {
        if (profile === activeProfile && activeEs) return
        connect(profile)
      }

      tabPc.addEventListener('click', () => onTabClick('pc'))
      tabDemo.addEventListener('click', () => onTabClick('demo'))

      connect('pc')
    </script>
  </body>
</html>
